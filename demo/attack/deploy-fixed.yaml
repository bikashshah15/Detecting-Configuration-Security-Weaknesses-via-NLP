apiVersion: v1
kind: Pod
metadata:
  name: attack1-fixed
spec:
  hostPID: false
  hostIPC: false
  hostNetwork: false
  containers:
    - name: attacker
      image: ubuntu:22.04
      command: ["sleep", "infinity"]
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 10001
        capabilities:
          drop: ["ALL"]